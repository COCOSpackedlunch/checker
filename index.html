<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>割引券QRチェッカー（当日用）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--paper:#fbf7f0;--ink:#2b2620;--line:#d8cfc0;--accent:#c4622d;--accent2:#3f6b4f;--danger:#b3392f;--mono:ui-monospace,monospace;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);}
.wrap{max-width:520px;margin:0 auto;padding:32px 20px 60px;}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
h1{font-size:22px;margin:0 0 4px;font-weight:800;}
p.lead{font-size:13px;color:#6b6258;margin-top:8px;}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px;margin-top:18px;}
#reader{width:100%;margin-top:14px;border-radius:8px;overflow:hidden;}
.result{margin-top:16px;padding:18px;border-radius:8px;font-size:18px;font-weight:800;text-align:center;display:none;}
.result.ok{display:block;background:#eaf3ec;color:var(--accent2);border:2px solid var(--accent2);}
.result.used{display:block;background:#fdeeea;color:var(--danger);border:2px solid var(--danger);}
.result.invalid{display:block;background:#f4f1ea;color:#9a9085;border:2px solid var(--line);}
.result .sub{font-size:12px;font-weight:400;margin-top:6px;font-family:var(--mono);}
.counter{font-family:var(--mono);font-size:13px;color:#6b6258;margin-top:10px;}
table{width:100%;font-size:12px;border-collapse:collapse;margin-top:12px;}
th,td{border-bottom:1px solid var(--line);padding:6px 4px;text-align:left;}
th{color:#9a9085;font-weight:700;font-family:var(--mono);font-size:11px;}
.tagok{color:var(--accent2);font-weight:700;}
.tagused{color:var(--danger);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
<div class="eyebrow">Lunch Sale / On-site Checker</div>
<h1>割引券QRチェッカー（当日用）</h1>
<p class="lead">QRコードをカメラに映すだけで自動判定します。</p>
<div class="card">
<strong style="font-size:14px;">QRコードをカメラに映してください</strong>
<button id="btnStart" onclick="startCamera()" style="display:block;width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;font-size:16px;font-weight:800;cursor:pointer;background:#c4622d;color:#fff;">カメラを起動する</button>
<button id="btnStop" onclick="stopCamera()" style="display:none;width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;font-size:16px;font-weight:800;cursor:pointer;background:#9a9085;color:#fff;">カメラを停止する</button>
<div id="reader"></div>
<div class="result" id="resultBox">
<div id="resultMain"></div>
<div class="sub" id="resultSub"></div>
</div>
<div class="counter" id="counter"></div>
</div>
<div class="card">
<strong style="font-size:14px;">一覧（現在の状態）</strong>
<table>
<thead><tr><th>コード</th><th>状態</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>
<script>
const CODES = ["2EYNGA","QWH3CX","ZYKQAJ","X9SQRM"];
const STORAGE_KEY = 'checker_202606151300';
function loadRecords(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved) return JSON.parse(saved);
  return CODES.map(c => ({ code: c, used: false }));
}
function saveRecords(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
let records = loadRecords();
function renderTable(){
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  records.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + r.code + '</td><td class="' + (r.used ? 'tagused' : 'tagok') + '">' + (r.used ? '使用済み' : '未使用') + '</td>';
    tbody.appendChild(tr);
  });
}
function updateCounter(){
  const used = records.filter(r => r.used).length;
  document.getElementById('counter').textContent = '使用済み: ' + used + ' / ' + records.length + ' 件';
}
let lastCode = null, lastTime = 0;
function onScanSuccess(text){
  const code = text.trim().toUpperCase();
  const now = Date.now();
  if(code === lastCode && now - lastTime < 2000) return;
  lastCode = code; lastTime = now;
  const rec = records.find(r => r.code === code);
  const box = document.getElementById('resultBox');
  const main = document.getElementById('resultMain');
  const sub = document.getElementById('resultSub');
  box.className = 'result';
  if(!rec){
    box.classList.add('invalid');
    main.textContent = '無効なコードです';
    sub.textContent = code;
  } else if(rec.used){
    box.classList.add('used');
    main.textContent = '既に使用済みです';
    sub.textContent = 'コード: ' + rec.code;
  } else {
    rec.used = true;
    box.classList.add('ok');
    main.textContent = '手続き完了';
    saveRecords();
    sub.textContent = 'コード: ' + rec.code + ' を使用済みにしました';
    renderTable();
    updateCounter();
  }
}
let scanner = null;
function startCamera(){
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='block';
  scanner = new Html5Qrcode('reader');
  Html5Qrcode.getCameras().then(devices => {
    if(devices && devices.length){
      scanner.start(devices[devices.length-1].id, {fps:10, qrbox:220}, onScanSuccess, ()=>{});
    }
  }).catch(err => { console.error(err); });
}
function stopCamera(){
  if(scanner){
    scanner.stop().then(() => {
      scanner = null;
      document.getElementById('reader').innerHTML='';
      document.getElementById('btnStart').style.display='block';
      document.getElementById('btnStop').style.display='none';
    });
  }
}
renderTable();
updateCounter();
</script>
</body>
</html>
